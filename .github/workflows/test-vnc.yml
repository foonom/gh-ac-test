name: Remote Testing
on: workflow_dispatch

jobs:
  remote-access:
    runs-on: ubuntu-latest
    steps:
      - name: Install Desktop & Graphics
        run: |
          sudo apt-get update
          sudo apt-get install -y xfce4 xfce4-terminal \
            tigervnc-standalone-server novnc websockify \
            mesa-utils libgl1-mesa-dri python3-pip mesa-vulkan-drivers 

      - name: Configure VNC & XFCE
        run: |
          mkdir -p ~/.vnc
          touch ~/.Xresources
          touch ~/.Xauthority
          echo "123" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          # We remove the '&' after startxfce4 so the script doesn't exit immediately
          cat <<EOF > ~/.vnc/xstartup
          #!/bin/bash
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          [ -r \$HOME/.Xresources ] && xrdb \$HOME/.Xresources
          startxfce4
          EOF
          chmod +x ~/.vnc/xstartup

      - name: Initialize Display & Graphics Check
        run: |
          # The error in this part is likely because Xvfb and VNC are fighting over display numbers.
          # We'll use :99 for Xvfb and :1 for VNC.
          Xvfb :99 -screen 0 720x1280x24 +extension RANDR &
          export DISPLAY=:99
          sleep 3
          glxinfo -B | grep -E "Device|Version|Vendor" || echo "Graphics check failed, but continuing..."
          
      - name: Start VNC & noVNC
        run: |
          # TigerVNC -vncserver cleans up old lock files and stays alive
          vncserver :1 -geometry 720x1280 -depth 24 -localhost no -rfbauth ~/.vnc/passwd
          /usr/share/novnc/utils/novnc_proxy --vnc localhost:5901 --listen 6080 &

      - name: Start pinggy
        run: |
          exit 0
          pip install pinggy
          python -c "import pinggy; tunnel = pinggy.start_tunnel(forwardto='localhost:6080'); print(f'Tunnel started. Urls: {tunnel.urls}')"

      - name: Start Cloudflare Tunnel with Robust Validation
        run: |
          if ! command -v cloudflared &> /dev/null; then
            wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
            sudo dpkg -i cloudflared-linux-amd64.deb
          fi

          MAX_RETRIES=5
          RETRY_COUNT=0
          VALID_URL=""

          while [ -z "$VALID_URL" ] && [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt $RETRY_COUNT: Starting Cloudflare Tunnel..."
            
            rm -f /tmp/cf.log
            cloudflared tunnel --url http://localhost:6080 > /tmp/cf.log 2>&1 &
            CF_PID=$!
            
            for i in {1..12}; do
              sleep 3
              FOUND_URL=$(grep -o 'https://[a-zA-Z0-9-]\+\.trycloudflare\.com' /tmp/cf.log | grep -v "api.trycloudflare.com" | head -n 1)
              
              if [ -n "$FOUND_URL" ]; then
                VALID_URL=$FOUND_URL
                break
              fi
            done

            if [ -z "$VALID_URL" ]; then
              echo "No valid Tunnel URL found (only saw errors or api.trycloudflare.com). Retrying..."
              kill $CF_PID || true
              sleep 5
            fi
          done

          if [ -z "$VALID_URL" ]; then
            echo "FAILED: Could not establish a tunnel after $MAX_RETRIES attempts."
            cat /tmp/cf.log
            exit 1
          else
            echo "**********************************************************"
            echo "SUCCESS! Tunnel Established."
            echo "ACCESS URL: ${VALID_URL}/vnc.html?resize=remote"
            echo "**********************************************************"
          fi
          
      - name: tqdm Testing 
        run: |
          git clone --depth 1 https://github.com/tqdm/tqdm.git /tmp/tqdm
          cd /tmp/tqdm
          pip install pytest pytest-timeout pytest-asyncio
          # Running tests in a loop
          for i in $(seq 1 72); do
            echo "--- Starting tqdm Tests at $(date) ---"
            pytest tests/ --maxfail=5 --durations=10
            sleep 300
          done
          
