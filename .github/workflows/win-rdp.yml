name: Windows RDP Testing
on: workflow_dispatch

jobs:
  rdp-session:
    runs-on: windows-latest
    steps:
      - name: Configure RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          $password = ConvertTo-SecureString "Password123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $password

      - name: Install Tunnel
        run: |
          curl.exe -L -o cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe

      - name: Start Tunnel
        shell: pwsh
        run: |
          # Using .\cloudflared.exe ensures PowerShell finds the file in the current folder
          Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url rdp://localhost:3389" -RedirectStandardOutput "tunnel.log"
          Start-Sleep -Seconds 15
          $url = Get-Content tunnel.log | Select-String -Pattern "https://.*\.trycloudflare\.com" | ForEach-Object { $_.Matches.Value }
          Write-Host "**********************************************************"
          Write-Host "ACCESS URL: $url"
          Write-Host "USER: runneradmin | PASS: Password123!"
          Write-Host "**********************************************************"

      - name: PowerShell Performance Stress Test
        run: |
          for ($i=1; $i -le 100; $i++) {
            $data = 1..50000 | ForEach-Object { [Math]::Pow($_, 2) }
            Write-Host "Background Test Cycle $i Complete"
            Start-Sleep -Seconds 300
          }
          
