name: Artifact Speed Test (Random Data)
on: workflow_dispatch

jobs:
  upload-test:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 
        run: |
          echo "something" > some_file
          whoami

          #mkdir -p ~/.ssh && echo "${{ secrets.SSH_KEY }}" >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys
          #ssh -o StrictHostKeyChecking=no -tt -R ghtestshh:22:localhost:22 serveo.net &
          #sleep 500
          
      - name: Generate Random File
        run: |
          echo "Generating 9GB of random data... this will take a moment."
          head -c 9G /dev/urandom > random_test_file
          du -h random_test_file

      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: random--artifact
          path: some_file
          compression-level: 9
          retention-days: 1
